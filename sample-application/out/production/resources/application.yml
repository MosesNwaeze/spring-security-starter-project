spring:
    application:
        name: sample-application
    datasource:
        url: jdbc:h2:mem:main_db
        driver-class-name: org.h2.Driver
        username: sa
        password: password
    jpa:
        database-platform: org.hibernate.dialect.H2Dialect
        hibernate:
            ddl-auto: update
    h2:
        console:
            enabled: true
            path: /h2-console
    jackson:
        default-property-inclusion: non_null

server:
    port: 8080


management:
    endpoints:
        web:
            exposure:
                include: "*"
            base-path: /api/public

logging:
    level:
        org.springframework.boot.context.properties: DEBUG

security:
    jwt:
        expiration: ${JWT_EXPIRATION:3600000}
        secret: ${JWT_SECRET:VGhpcy1pcy1hLXN1cGVyLXNlY3VyZS1qd3Qta2V5LTEyMzQ1Ng==}
